# E2E test stack: builds the app image, waits for it to be healthy, then runs
# the Playwright suite against it. Keeps browser deps out of the app image.
#
# Run from the project root:
#   docker compose -f test/docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from playwright
services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: finally:latest
    environment:
      - LLM_MOCK=true
    volumes:
      - finally-test-data:/app/db
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  playwright:
    image: mcr.microsoft.com/playwright:v1.44.0
    depends_on:
      app:
        condition: service_healthy
    environment:
      # Reach the app by its compose service name over the shared network.
      - BASE_URL=http://app:8000
    volumes:
      - ./:/test
    working_dir: /test
    command: npx playwright test

volumes:
  finally-test-data:
