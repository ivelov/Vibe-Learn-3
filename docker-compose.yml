services:
  finally:
    build:
      context: .
      dockerfile: Dockerfile
    image: finally:latest
    container_name: finally
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - finally-data:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  finally-data:
